version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp_maker
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: erp-maker-backend-container
    restart: always
    depends_on:
      db:
        condition: service_healthy   # ⬅️ Attend que MySQL soit OK avant de lancer l'app
    environment:
      NODE_ENV: production
      PORT: 3045

      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: erp_maker

      DATABASE_URL: mysql://root:root@db:3306/erp_maker

      JWT_SECRET: jesuilejwtsecretpourerpmakeretvoiciunesuccessiondelettrepourmerendredifficilalireddehtttldffkdlsemmldekggkehdlcs
    ports:
      - "3045:3045"

volumes:
  db_data:
